apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace 'com.applimiter.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.applimiter.app"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
}
